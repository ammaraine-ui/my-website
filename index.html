<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AAT ERP v9 PRO</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <div id="loginScreen" class="login-shell">
      <div class="login-card">
        <div class="brand-row">
          <div class="brand-badge">AAT</div>
          <div>
            <h1>نظام شركة عمار العاني</h1>
            <p>v9 PRO — نسخة احترافية مفتوحة</p>
          </div>
        </div>
        <div class="login-grid">
          <label>اسم المستخدم</label>
          <input id="loginUsername" type="text" placeholder="admin" />
          <label>الرقم السري</label>
          <input id="loginPassword" type="password" placeholder="123456" />
        </div>
        <button class="primary-btn full" id="loginBtn">دخول</button>
        <div class="hint-box">
          <strong>الحساب الافتراضي:</strong> admin / 123456
        </div>
      </div>
    </div>

    <div id="mainApp" class="hidden">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="brand-badge">AAT</div>
          <div>
            <h2>عمار العاني</h2>
            <small id="currentUserLabel"></small>
          </div>
        </div>

        <div class="search-box">
          <input id="globalSearch" type="text" placeholder="ابحث عن صنف، فاتورة، عميل، مورد..." />
          <div id="globalSuggestions" class="suggestions hidden"></div>
        </div>

        <nav id="sidebarNav" class="menu"></nav>

        <div class="sidebar-bottom">
          <button class="ghost-btn full" id="logoutBtn">تسجيل خروج</button>
        </div>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <h1 id="pageTitle">لوحة التحكم</h1>
            <p id="pageSubtitle">نظرة تنفيذية سريعة على الشركة</p>
          </div>
          <div class="topbar-actions">
            <button class="outline-btn" id="backupBtn">نسخة احتياطية</button>
            <button class="outline-btn" id="restoreBtn">استيراد نسخة</button>
            <input type="file" id="restoreFile" class="hidden" accept="application/json" />
          </div>
        </header>

        <section id="dashboardSection" class="page-section"></section>
        <section id="salesSection" class="page-section hidden"></section>
        <section id="purchasesSection" class="page-section hidden"></section>
        <section id="itemsSection" class="page-section hidden"></section>
        <section id="inventorySection" class="page-section hidden"></section>
        <section id="customersSection" class="page-section hidden"></section>
        <section id="suppliersSection" class="page-section hidden"></section>
        <section id="debtsSection" class="page-section hidden"></section>
        <section id="transfersSection" class="page-section hidden"></section>
        <section id="reportsSection" class="page-section hidden"></section>
        <section id="suggestionsSection" class="page-section hidden"></section>
        <section id="settingsSection" class="page-section hidden"></section>
        <section id="usersSection" class="page-section hidden"></section>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
